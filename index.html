<!DOCTYPE html>
<html>
<head>
<title>Bassie’s Game World</title>

<style>
body {
    background-color: #1a1a2e;
    color: #f5c6ff;
    font-family: Arial;
    text-align: center;
    margin: 0;
}

h1 {
    background-color: #2e1a47;
    color: #ff9de2;
    padding: 15px;
}

.tabs {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
}

.tab-button {
    background: #ff9de2;
    border: none;
    padding: 10px 15px;
    margin: 5px;
    cursor: pointer;
    border-radius: 10px;
}

.tab-button:hover {
    background: #ff6fd8;
}

.section {
    display: none;
    padding: 10px;
}

.active {
    display: block;
}

.game-box {
    background-color: #2b2b3c;
    margin: 20px auto;
    padding: 20px;
    border-radius: 15px;
    width: 70%;
}

button {
    background-color: #ff9de2;
    border: none;
    padding: 10px 20px;
    border-radius: 10px;
    cursor: pointer;
}

button:hover {
    background-color: #ff6fd8;
}

/* 🌳 SKILL TREE STYLES */
.skill-overlay {
    display:none;
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    background:rgba(120, 90, 160, 0.35);
    backdrop-filter: blur(6px);
}

.skill-panel {
    background:#2b2b3c;
    width:90%;
    margin:3% auto;
    padding:20px;
    border-radius:15px;
    color:white;
}

.tree-container {
    position: relative;
    width: 100%;
    height: 500px;
}

/* nodes */
.node {
    position:absolute;
    width:120px;
    padding:10px;
    border-radius:10px;
    cursor:pointer;
    text-align:center;
    font-size:12px;
}

.locked {
    background: rgba(120, 90, 160, 0.25);
    color:#ddd;
}

.unlocked {
    background:#ff9de2;
    color:black;
}

/* lines */
svg {
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:0;
}

.node {
    z-index:2;
}
</style>
</head>

<body>

<h1>🎀 Bassie’s Game World 🎀</h1>

<div class="tabs">
    <button class="tab-button" onclick="openTab('games')">Games</button>
    <button class="tab-button" onclick="openTab('clicker')">Clicker</button>
    <button class="tab-button" onclick="openTab('tutorials')">Tutorials</button>
</div>

<!-- CLICKER -->
<div id="clicker" class="section active">

<div class="game-box">
    <h2>🌳 REAL BRANCHING SKILL TREE</h2>

    <p id="score">Score: 0</p>
    <p id="mult">Multiplier: 1x</p>

    <button onclick="openTree()">OPEN SKILL TREE</button>
    <button onclick="clickGame()">CLICK</button>
    <button onclick="rebirth()">REBIRTH (720M)</button>
</div>

</div>

<!-- SKILL TREE -->
<div id="skillTree" class="skill-overlay">

<div class="skill-panel">

<h2>🌳 Branching Skill Tree</h2>
<button onclick="closeTree()">Close</button>

<div class="tree-container">

<svg id="lines"></svg>

<div class="node locked" id="n1" style="top:200px;left:50px" onclick="buy('n1')">+1 Click</div>

<div class="node locked" id="n2" style="top:120px;left:250px" onclick="buy('n2')">Auto Click</div>
<div class="node locked" id="n3" style="top:280px;left:250px" onclick="buy('n3')">Crit Chance</div>

<div class="node locked" id="n4" style="top:80px;left:450px" onclick="buy('n4')">Auto Speed</div>
<div class="node locked" id="n5" style="top:180px;left:450px" onclick="buy('n5')">x2 Click</div>
<div class="node locked" id="n6" style="top:300px;left:450px" onclick="buy('n6')">Crit x2</div>

</div>

</div>
</div>

<script>

let score = 0;
let clickPower = 1;
let multiplier = 1;
let rebirths = 0;

let unlocked = {};

// 🌳 TREE STRUCTURE (REAL BRANCHING)
const tree = {
    n1: {cost:50, unlocks:["n2","n3"], effect:()=>clickPower++},
    n2: {cost:120, unlocks:["n4","n5"], effect:()=>startAuto()},
    n3: {cost:200, unlocks:["n6"], effect:()=>multiplier+=0.2},
    n4: {cost:500, effect:()=>multiplier+=0.5},
    n5: {cost:800, effect:()=>clickPower*=2},
    n6: {cost:1000, effect:()=>multiplier*=2}
};

function openTree(){
    document.getElementById("skillTree").style.display="block";
    drawLines();
}

function closeTree(){
    document.getElementById("skillTree").style.display="none";
}

function buy(id){
    let node = tree[id];

    if(score >= node.cost && !unlocked[id]){
        score -= node.cost;
        unlocked[id]=true;

        document.getElementById(id).classList.remove("locked");
        document.getElementById(id).classList.add("unlocked");

        node.effect();

        if(node.unlocks){
            node.unlocks.forEach(u=>{
                document.getElementById(u).style.opacity="1";
            });
        }
    }
}

function drawLines(){
    const svg = document.getElementById("lines");
    svg.innerHTML = "";

    const lines = [
        ["n1","n2"],
        ["n1","n3"],
        ["n2","n4"],
        ["n2","n5"],
        ["n3","n6"]
    ];

    lines.forEach(pair=>{
        let a = document.getElementById(pair[0]).getBoundingClientRect();
        let b = document.getElementById(pair[1]).getBoundingClientRect();

        let line = document.createElementNS("http://www.w3.org/2000/svg","line");

        line.setAttribute("x1", a.left + 60);
        line.setAttribute("y1", a.top + 20);
        line.setAttribute("x2", b.left + 60);
        line.setAttribute("y2", b.top + 20);

        line.setAttribute("stroke","#ff9de2");
        line.setAttribute("stroke-width","2");

        svg.appendChild(line);
    });
}

function clickGame(){
    score += clickPower * multiplier;
    update();
}

function rebirth(){
    if(score >= 720000000){
        score=0;
        clickPower=1;
        multiplier=1;
        rebirths++;
        update();
    }
}

function startAuto(){
    setInterval(()=>{
        score += 1 * multiplier;
        update();
    },1000);
}

function update(){
    document.getElementById("score").innerText="Score: "+score;
    document.getElementById("mult").innerText="Multiplier: "+multiplier;
}

function openTab(tab){
    document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
    document.getElementById(tab).classList.add("active");
}

update();

</script>

</body>
</html>
